# ===============================
# Application
# ===============================
spring.application.name=demo

# ===============================
# MySQL Datasource
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/demo_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT
# ===============================
# 256-bit (or longer) secret, base64 or plain string - replace in production and load from env var
jwt.secret=ChangeThisSuperSecretKeyToSomethingLongAndRandom123456789
jwt.expiration-ms=86400000

# ===============================
# Swagger / springdoc-openapi
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# Server
# ===============================
server.port=8080
